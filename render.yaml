services:
  - type: web
    name: pythonEditor
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r project/pythonEditor/requirements.txt && cd project/pythonEditor && python manage.py collectstatic --noinput
    startCommand: cd project/pythonEditor && python manage.py migrate && daphne -b 0.0.0.0 -p $PORT pythonEditor.asgi:application
