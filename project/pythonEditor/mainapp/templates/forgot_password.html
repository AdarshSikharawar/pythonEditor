{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link href="{% static 'styles/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'styles/theme.css' %}" rel="stylesheet">
    <link href="{% static 'styles/toast.css' %}" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{% static 'styles/authentication.css' %}">
    <link rel="icon" type="image/png" href="{% static 'img/icon_logo.png' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body style="overflow-x: hidden;">
    <div id="toast-container"></div>
    <!-- Background Gradients -->
    <div class="gradient-blob"
        style="top: -10%; left: -10%; width: 500px; height: 500px; background: radial-gradient(circle, #bb86fc 0%, rgba(187, 134, 252, 0) 70%);">
    </div>
    <div class="gradient-blob"
        style="top: 20%; right: -10%; width: 600px; height: 600px; background: radial-gradient(circle, #3700b3 0%, rgba(55, 0, 179, 0) 70%); animation-delay: -2s;">
    </div>
    <div class="gradient-blob"
        style="bottom: -10%; left: 20%; width: 700px; height: 700px; background: radial-gradient(circle, rgba(3, 218, 198, 0.3) 0%, rgba(3, 218, 198, 0) 70%); animation-delay: -5s;">
    </div>

    <div class="content-wrapper glass-panel">
        <div class="image-section">
            <img src="{% static 'img/auth_image.webp' %}" alt="Security illustration">
        </div>

        <div class="form-section active" style="display: flex;">
            <div class="login-box">
                <h1>Reset Password</h1>
                <p class="subheading">Enter your email to receive a password reset OTP.</p>

                <form action="{% url 'forgot_password' %}" method="POST">
                    {% csrf_token %}
                    <div class="form-group pb-4">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required
                            class="form-control-glass">
                    </div>

                    <button type="submit" class="login-btn">Send Reset Link</button>
                </form>

                <div class="separator" style="margin: 1.5rem 0; text-align: center; color: #aaa; position: relative;">
                </div>

                <p class="signup-link">
                    Remember your password? <a href="{% url 'auth' %}">Log In</a>
                </p>
            </div>
        </div>
    </div>

    <script src="{% static 'js/toast.js' %}"></script>

    <!-- Hidden container for Django messages -->
    <div id="django-messages-container" style="display: none;">
        {% if messages %}
        {% for message in messages %}
        <div data-tags="{{ message.tags }}" data-message="{{ message }}"></div>
        {% endfor %}
        {% endif %}
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const messageContainer = document.getElementById('django-messages-container');
            if (messageContainer) {
                const messageElements = messageContainer.querySelectorAll('div');
                messageElements.forEach(el => {
                    const tags = el.getAttribute('data-tags') || '';
                    const text = el.getAttribute('data-message') || '';

                    let type = 'info';
                    if (tags.includes('success')) type = 'success';
                    else if (tags.includes('error') || tags.includes('danger')) type = 'error';
                    else if (tags.includes('warning')) type = 'warning';

                    if (text) showToast(type, text);
                });
            }
        });
    </script>
</body>
</html>
