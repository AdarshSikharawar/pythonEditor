{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link href="{% static 'styles/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'styles/theme.css' %}" rel="stylesheet">
    <link href="{% static 'styles/toast.css' %}" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{% static 'styles/authentication.css' %}">
    <link rel="icon" type="image/png" href="{% static 'img/icon_logo.png' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body style="overflow-x: hidden;">
    <div id="toast-container"></div>
    <div class="gradient-blob" style="top: -10%; left: -10%; width: 500px; height: 500px; background: radial-gradient(circle, #bb86fc 0%, rgba(187, 134, 252, 0) 70%);"></div>
    <div class="gradient-blob" style="top: 20%; right: -10%; width: 600px; height: 600px; background: radial-gradient(circle, #3700b3 0%, rgba(55, 0, 179, 0) 70%); animation-delay: -2s;"></div>
    <div class="gradient-blob" style="bottom: -10%; left: 20%; width: 700px; height: 700px; background: radial-gradient(circle, rgba(3, 218, 198, 0.3) 0%, rgba(3, 218, 198, 0) 70%); animation-delay: -5s;"></div>

    <div class="content-wrapper glass-panel">
        <div class="image-section">
            <img src="{% static 'img/auth_image.webp' %}" alt="Security illustration">
        </div>

        <div class="form-section active" style="display: flex;">
            <div class="login-box">
                <h1>Create New Password</h1>
                <p class="subheading">Enter your new password.</p>

                <form action="{% url 'reset_password' %}" method="POST" onsubmit="return validateForm()">
                    {% csrf_token %}
                    <div class="form-group pb-2">
                        <label for="password">New Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required class="form-control-glass">
                    </div>
                    
                    <div class="form-group pb-4">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" name="confirm-password" onkeyup="validate()" placeholder="••••••••" required class="form-control-glass">
                        <p id="msg" class="text-danger mt-1 small"></p>
                    </div>

                    <button type="submit" class="login-btn">Change Password</button>
                </form>
            </div>
        </div>
    </div>

    <script src="{% static 'js/toast.js' %}"></script>
    <script>
        function validate() {
            let password = document.getElementById("password").value.trim();
            let confirmPassword = document.getElementById("confirm-password").value.trim();
            let message = document.getElementById("msg");

            message.textContent = "";

            if (confirmPassword === "") return;

            if (password === confirmPassword) {
                message.classList.remove("text-danger");
                message.classList.add("text-success");
                message.textContent = "Password matched";
            } else {
                message.classList.remove("text-success");
                message.classList.add("text-danger");
                message.textContent = "Both passwords must be the same";
            }
        }

        function validateForm() {
            let password = document.getElementById("password").value.trim();
            let confirmPassword = document.getElementById("confirm-password").value.trim();

            if (password !== confirmPassword) {
                showToast('error', 'Passwords do not match!');
                return false;
            }
            return true;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const messageContainer = document.getElementById('django-messages-container');
            if (messageContainer) {
                const messageElements = messageContainer.querySelectorAll('div');
                messageElements.forEach(el => {
                    const tags = el.getAttribute('data-tags') || '';
                    const text = el.getAttribute('data-message') || '';

                    let type = 'info';
                    if (tags.includes('success')) type = 'success';
                    else if (tags.includes('error') || tags.includes('danger')) type = 'error';
                    else if (tags.includes('warning')) type = 'warning';

                    if (text) showToast(type, text);
                });
            }
        });
    </script>

    <div id="django-messages-container" style="display: none;">
        {% if messages %}
        {% for message in messages %}
        <div data-tags="{{ message.tags }}" data-message="{{ message }}"></div>
        {% endfor %}
        {% endif %}
    </div>

</body>
</html>
